<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Awards App</title>

<link rel="stylesheet" href="./css/styles.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/pages.css">
<link rel="stylesheet" href="./css/picks.css">

</head>

<body>

<!-- HEADER -->
<header class="app-header">

  <div class="header-left">
    🏆 Awards App
  </div>

  <div
    id="headerUser"
    class="header-user"
  >
    User
  </div>

</header>

<!-- MAIN -->
<main id="app"></main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">

  <button data-page="dashboard"
    onclick="navigate('dashboard')">
    Home
  </button>

  <button data-page="picks"
    onclick="navigate('picks')">
    Picks
  </button>

  <button data-page="leaderboard"
    onclick="navigate('leaderboard')">
    Leaderboard
  </button>

  <button
    id="adminNavButton"
    data-page="admin"
    onclick="navigate('admin')"
    style="display:none;"
  >
    Admin
  </button>

  <button onclick="logout()">
    Logout
  </button>

</nav>

<!-- LOADER -->
<div id="loader" class="loader hidden">
  <div class="spinner"></div>
</div>

<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/api.js"></script>
<script src="./js/state.js"></script>
<script src="./js/utils.js"></script>

<script src="./js/pages/dashboard.js"></script>
<script src="./js/pages/picks.js"></script>
<script src="./js/pages/leaderboard.js"></script>
<script src="./js/pages/admin.js"></script>
<script src="./js/pages/adminGames.js"></script>
<script src="./js/pages/adminGameSetup.js"></script>

<script src="./js/app.js"></script>

</body>
</html>
