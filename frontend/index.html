<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    viewport-fit=cover
  "
>

<title>Awards App</title>

<link
  rel="stylesheet"
  href="./css/styles.css"
>

</head>

<body>

<div class="login-page">

  <div class="login-card">

    <div class="login-title">
      🏆 Awards App
    </div>

    <div class="login-sub">
      Sign in to continue
    </div>

    <input
      id="username"
      class="input"
      placeholder="Username"
      autocomplete="username"
    >

    <input
      id="pin"
      class="input"
      placeholder="PIN"
      inputmode="numeric"
      maxlength="4"
      type="password"
    >

    <button
      class="button"
      onclick="login()"
    >
      Login
    </button>

    <div
      id="error"
      class="error hidden"
    >
      Invalid login
    </div>

  </div>

</div>

<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/api.js"></script>
<script src="./js/state.js"></script>
<script src="./js/auth.js"></script>

</body>
</html>
